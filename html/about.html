        <p>你好啊。</p>
        <p>有时能把诗都读哭，</p>
        <p>有时也想像块石头一样躺在满是狗屎的草坪上。</p>
        <br>
        <p>昨晚做了个梦，梦到得了病，只能再活一天。于是今天想到，我的生命好像很薄，如果现在死掉了，不到50字就足以介绍生平，想想多少有点可悲。</p>
        <p>我早就过了自怨自艾的年纪，只是有时感到迷失。可另一个角度来看，这也是一种自由，没有方向同样也代表没有束缚，可以去做任何想做的事。</p>
        <p>18年距离现在已经过去了8年，我们离2050年比2000年更近，日子很慢，日子很快。</p>
        <p>最后还是祝大家能平静自由，好好生活。把生命过厚一点，不至于让自己连脚都站不住。</p>
