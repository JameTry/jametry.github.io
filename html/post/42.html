<body>
<div class="w">
    <article >
        <p>我是读者</p>
        <p>有时也是作者</p>
        <p>当我的眼睛一行行</p>
        <p>抚摸过那些痛苦的</p>
        <p>文字身上的伤疤——</p>
        <p>弹片与胸腔</p>
        <p>房梁压着脊梁</p>
        <p>嘶哑地哭喊、流不出泪的绝望</p>
        <p>当苦难，都变成令作者也赞叹的</p>
        <p>笔下的一句诗词、一个段落</p>
        <p>他会感到高兴？还是更加悲伤？</p>
        <br>
        <p>直到我不止一次</p>
        <p>为文字而流下眼泪</p>
        <p>才突然明白：</p>
        <p>我竟如此深爱着</p>
        <p>那些与我毫不相关的人</p>
        <span class="time">2026年3月5日</span>
    </article>
</div>
