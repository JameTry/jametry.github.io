    <article>
        <h1>四月</h1>
        <br>
        <p>四月 深邃的天 蓝得发黑</p>
        <p>阳光温暖 阴影清凉</p>
        <p>鸟鸣从嫩芽中生长出来</p>
        <p>在耳边环绕</p>
        <br>
        <p>风 从凌冽的远方呼啸而来</p>
        <p>呼啸！呼啸，呼啸……</p>
        <p>远方远到</p>
        <p>等遇见它时 已经轻得</p>
        <p>叩开了紧闭的心房</p>
        <p>如丝线 如一根飘落的羽毛</p>
        <p>拂过草木与大地</p>
        <p>晃悠悠 慢悠悠 悠悠地</p>
        <p>微微荡漾 静止般地安详</p>
        <br>
        <p>我站在斑驳树影下抬头仰望</p>
        <p>仰望大树低声地呢喃</p>
        <p>或许 风也是树叶们的语言</p>
        <p>一开口</p>
        <p>便簌簌作响</p>
        <span class="time">2026年4月7日</span>
    </article>
