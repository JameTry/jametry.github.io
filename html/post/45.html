        <p>“哥你什么时候回来？”</p>
        <p>“今天就回去。”</p>
        <p>“那你路上慢点，家里下了大雨，路上好多地方都滑坡了。”</p>
        <p>“妈呢？你把电话给她。”</p>
        <p>“她这会睡了，早上……妈说想再见见你。”</p>
        <p>“……我正在订票。”</p>
        <br>
        <p>地铁进站，我登上车匆匆坐下。</p>
        <p>手机上显示八百六十公里。</p>
        <p>当然。</p>
        <p>飞机三小时，高铁要六小时，坐汽车要……</p>
        <p>车轮与轨道的摩擦声，撞击声灌满整个车厢，震耳欲聋。</p>
        <p>“……声音的速度是三百四十米每秒……”我抬起头望向车窗，“……四十二分钟我才能听到那边的雷声。”</p>
        <span class="time">2026年4月1日</span>
