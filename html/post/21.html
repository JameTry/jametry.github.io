        <h1>引力弹弓</h1>
        <p>数百万年对宇宙来说太短，</p>
        <p>对人类来说太长，</p>
        <p>藏匿在暗蓝色宇宙中的行星，</p>
        <p>总是那样遥远，</p>
        <p>总是那样惆怅。</p>
        <br>
        <p>在图片中看见你的身影，</p>
        <p>我就爱上了未曾谋面的你，</p>
        <p>在我距离你</p>
        <p>就像你距离我一样远的行星上，</p>
        <p>你能否知道？</p>
        <br>
        <p>每当我仰望夜空，</p>
        <p>只能看到微尘般的星光——你半刻前的容貌。</p>
        <p>你不能总是这样，</p>
        <p>总是这样遥远，</p>
        <p>总是这样令人着迷又令人悲伤。</p>
        <br>
