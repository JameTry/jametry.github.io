<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>404</title>
    <link rel="stylesheet" href="/style/post.css">
</head>
<style>
    img {
        display: inline-block;
        animation: floatWiggle 4s ease-in-out infinite;
        transform-origin: center;
        will-change: transform;
        margin-top: 10px;
        margin-bottom: 10px;
    }

    @keyframes floatWiggle {
        0% {
            transform: translate(0px, 0px) scale(1) rotate(0deg);
        }
        25% {
            transform: translate(2px, -3px) scale(1.01) rotate(0.3deg);
        }
        50% {
            transform: translate(-2px, 2px) scale(0.99) rotate(-0.3deg);
        }
        75% {
            transform: translate(1px, -2px) scale(1.01) rotate(0.2deg);
        }
        100% {
            transform: translate(0px, 0px) scale(1) rotate(0deg);
        }
    }
</style>
<body>
<div class="w">

    <article>
        <p>你探索到了一片未知的领域。</p>
        <img src="/img/sys/404.png">
        <br>
        <p><a href="/">回首页</a></p>
    </article>


</div>
</body>
</html>
